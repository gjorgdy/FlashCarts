plugins {
    id "com.modrinth.minotaur" version "2.+"
    id 'net.fabricmc.fabric-loom' version "${loom_version}"
}

var min_minecraft_version = project.minecraft_versions.split(',').first()
var last_minecraft_version = project.minecraft_versions.split(',').last()
var mc_version = min_minecraft_version == last_minecraft_version
        ? min_minecraft_version
        : "${min_minecraft_version}-${last_minecraft_version}"
version = "${project.mod_version}+${mc_version}"
group = project.maven_group

base {
    archivesName = project.mod_name
}

repositories {
    maven {
        name = "FzzyMaven"
        url = "https://maven.fzzyhmstrs.me/"
    }
    maven {
        name = "Terraformers"
        url = "https://maven.terraformersmc.com/"
    }
}

dependencies {
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    implementation "net.fabricmc:fabric-loader:${project.loader_version}"
    implementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_api_version}"
    // Fzzy Config
    implementation "me.fzzyhmstrs:fzzy_config:${project.fzzy_config_version}"
}

processResources {
    inputs.property "version", project.version
    inputs.property "minecraft_version", project.minecraft_version
    inputs.property "loader_version", project.loader_version
    filteringCharset "UTF-8"

    filesMatching("fabric.mod.json") {
        expand "version": project.version,
                "minecraft_version": project.minecraft_version,
                "loader_version": project.loader_version,
                "fzzy_config_version": project.fzzy_config_version
    }
}

def targetJavaVersion = 25
tasks.withType(JavaCompile).configureEach {
    it.options.encoding = "UTF-8"
    it.options.release.set(targetJavaVersion)
}

java {
    def javaVersion = JavaVersion.toVersion(targetJavaVersion)
    if (JavaVersion.current() < javaVersion) {
        toolchain.languageVersion = JavaLanguageVersion.of(targetJavaVersion)
    }
    withSourcesJar()
}

jar {
    from("LICENSE") {
        rename { "${it}_${mod_name}" }
    }
}

static String getModrinthToken() {
    return new File('.env')
            .readLines()
            .findAll { it?.trim() && !it.trim().startsWith('#') }
            .collect { it.split('=') }
            .find { it[0] == 'MODRINTH_TOKEN' }[1]
}

tasks.modrinth.dependsOn(tasks.modrinthSyncBody)
modrinth {
    autoAddDependsOn = false
    token = getModrinthToken()
    projectId = project.mod_id
    versionName = "${project.mod_name} ${version}"
    versionNumber = "${version}"
    changelog = rootProject.file("changelog.md").text
    syncBodyFrom = rootProject.file("README.md").text
    versionType = project.mod_release_type
    uploadFile = jar
    gameVersions = project.minecraft_versions.split(',') as List<String>
    loaders = ["fabric"]
    dependencies {
        optional.version "fzzy-config", project.fzzy_config_version
    }
}